name: Atualizar dados do Rio Iguaçu

on:
  schedule:
    # Baseline redundante (v1.22, 12/07/2026): o disparo PRINCIPAL agora vem
    # do Cloudflare Worker "rioiguacu-trigger" (Cron Trigger a cada 5 min,
    # chama workflow_dispatch via API do GitHub) -- o cron nativo do GitHub
    # Actions é usado só como rede de segurança caso o Worker pare.
    #
    # Removida a rajada "todo minuto de HH:01-05" que existia até a v1.21:
    # medindo o histórico de commits, ela causava atrasos de mais de 2h em
    # vários dias, porque o próprio GitHub avisa que o início de cada hora é
    # o pico de carga global do agendador `schedule` -- ou seja, a rajada
    # rodava justamente na janela mais congestionada e menos confiável,
    # piorando o atraso que ela tentava evitar. Não reintroduzir essa rajada.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: atualizar-dados
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar coleta
        env:
          ANA_API_LOGIN: ${{ secrets.ANA_API_LOGIN }}
          ANA_API_SENHA: ${{ secrets.ANA_API_SENHA }}
        run: python scrape.py

      - name: Commit e push do data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json monitor_web.log historico_diario.csv
          # Só publica (e só gera deploy no Cloudflare Pages) quando o
          # data.json ou o historico_diario.csv realmente mudaram --
          # monitor_web.log muda em toda execução (é só texto de log) e não
          # deve, sozinho, disparar um deploy. É isso que permite rodar a
          # cada 5 min (via Worker) sem reintroduzir o engarrafamento de
          # deploys da v1.6.
          if git diff --staged --quiet -- data.json historico_diario.csv; then
            echo "Sem mudança em data.json/historico_diario.csv; não publica nesta rodada."
            exit 0
          fi
          # Guarda os arquivos recém-coletados fora do repo, pois em caso de
          # conflito de push vamos resetar a árvore local para o remoto.
          mkdir -p /tmp/coleta_atual
          cp data.json /tmp/coleta_atual/ 2>/dev/null || true
          cp monitor_web.log /tmp/coleta_atual/ 2>/dev/null || true
          cp historico_diario.csv /tmp/coleta_atual/ 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git commit -m "Atualiza dados do Rio Iguaçu" -q || true
            if git push; then
              echo "Push concluído na tentativa $i."
              exit 0
            fi
            echo "Push rejeitado (tentativa $i/5): outra execução chegou primeiro. Sincronizando..."
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/coleta_atual/data.json . 2>/dev/null || true
            cp /tmp/coleta_atual/monitor_web.log . 2>/dev/null || true
            cp /tmp/coleta_atual/historico_diario.csv . 2>/dev/null || true
            git add data.json monitor_web.log historico_diario.csv
            sleep $((RANDOM % 6 + 2))
          done
          echo "Falha ao empurrar as mudanças após 5 tentativas."
          exit 1
